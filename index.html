<!DOCTYPE html>
<html lang="en" data-mood="calm">
<head>
  <!-- 1. Charset + viewport FIRST — no exceptions -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- 2. Preconnect: open connections early while browser parses HTML -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- When backend is live: -->
  <!-- <link rel="preconnect" href="https://api.lumina.in" /> -->
  <!-- <link rel="preconnect" href="https://cdn.lumina.in" /> -->

  <!-- 3. Critical CSS — inlined, never render-blocking.
       Contains minimum styles for above-the-fold skeleton.
       Replace with output of: node scripts/generate-critical.js -->
  <style id="critical-css">
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;font-size:16px;-webkit-text-size-adjust:100%}
    body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
         background:#FDFAF5;color:#3D3A37;line-height:1.6;
         -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    #root{min-height:100vh}
    .sk-shell{display:flex;min-height:100vh;background:#FDFAF5}
    .sk-sidebar{width:240px;background:#F5F0E8;border-right:1px solid #E8E0D0;
                padding:24px 16px;display:flex;flex-direction:column;gap:16px;
                flex-shrink:0}
    .sk-main{flex:1;padding:24px;display:flex;flex-direction:column;gap:20px;max-width:680px}
    .sk{background:linear-gradient(90deg,#EDE8DF 25%,#F5F0E8 50%,#EDE8DF 75%);
        background-size:200% 100%;animation:sk-shimmer 1.5s infinite;border-radius:8px}
    @keyframes sk-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .sk-logo{width:80px;height:28px;border-radius:6px}
    .sk-nav{width:100%;height:40px;border-radius:8px}
    .sk-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0}
    .sk-line{height:14px;border-radius:4px}
    .sk-card{background:#FFF;border-radius:12px;padding:20px;
             display:flex;flex-direction:column;gap:12px;
             border:1px solid #E8E0D0}
    .sk-card-row{display:flex;gap:12px;align-items:center}
    @media(prefers-reduced-motion:reduce){.sk{animation:none;background:#EDE8DF}}
    @media(max-width:767px){.sk-sidebar{display:none}.sk-main{padding:16px;max-width:100%}}
  </style>

  <!-- 4. Preload LCP resource (hero font — display font shown in H1) -->
  <!-- When font files exist locally: -->
  <!-- <link rel="preload" href="/fonts/Fraunces-subset.woff2" as="font" type="font/woff2" crossorigin /> -->
  <!-- <link rel="preload" href="/fonts/PlusJakartaSans-subset.woff2" as="font" type="font/woff2" crossorigin /> -->

  <!-- 5. Google Fonts — fallback while self-hosted fonts aren't available yet -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet" />

  <!-- 6. SEO & Identity -->
  <title>Lumina — Your story finds its people</title>
  <meta name="description" content="A wellbeing community where people share lived experiences, thoughts, and emotions. Join thousands finding connection and meaning." />
  <link rel="canonical" href="https://lumina.in" />

  <!-- 7. Open Graph -->
  <meta property="og:type"         content="website" />
  <meta property="og:url"          content="https://lumina.in" />
  <meta property="og:title"        content="Lumina — Your story finds its people" />
  <meta property="og:description"  content="A warm community for honest human stories." />
  <meta property="og:image"        content="https://lumina.in/og-image.jpg" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- 8. Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Lumina — Your story finds its people" />
  <meta name="twitter:description" content="A warm community for honest human stories." />
  <meta name="twitter:image"       content="https://lumina.in/og-image.jpg" />

  <!-- 9. Theme color — light and dark -->
  <meta name="theme-color" content="#C4973A" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1A1814" media="(prefers-color-scheme: dark)" />

  <!-- 10. PWA -->
  <meta name="mobile-web-app-capable"         content="yes" />
  <meta name="apple-mobile-web-app-capable"   content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title"     content="Lumina" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

  <!-- 11. Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <!-- Skeleton shell — visible instantly before React mounts.
       Exact same layout as the real AppShell to prevent layout shift. -->
  <div id="root">
    <div class="sk-shell" aria-hidden="true">
      <nav class="sk-sidebar">
        <div class="sk sk-logo"></div>
        <div class="sk sk-nav"></div>
        <div class="sk sk-nav"></div>
        <div class="sk sk-nav"></div>
        <div class="sk sk-nav"></div>
        <div class="sk sk-nav"></div>
      </nav>
      <main class="sk-main">
        <div class="sk-card">
          <div class="sk-card-row">
            <div class="sk sk-avatar"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:8px">
              <div class="sk sk-line" style="width:40%"></div>
              <div class="sk sk-line" style="width:25%"></div>
            </div>
          </div>
          <div class="sk sk-line" style="width:90%"></div>
          <div class="sk sk-line" style="width:75%"></div>
          <div class="sk sk-line" style="width:60%"></div>
        </div>
        <div class="sk-card">
          <div class="sk-card-row">
            <div class="sk sk-avatar"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:8px">
              <div class="sk sk-line" style="width:50%"></div>
              <div class="sk sk-line" style="width:30%"></div>
            </div>
          </div>
          <div class="sk sk-line" style="width:85%"></div>
          <div class="sk sk-line" style="width:70%"></div>
        </div>
        <div class="sk-card">
          <div class="sk-card-row">
            <div class="sk sk-avatar"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:8px">
              <div class="sk sk-line" style="width:35%"></div>
              <div class="sk sk-line" style="width:20%"></div>
            </div>
          </div>
          <div class="sk sk-line" style="width:95%"></div>
          <div class="sk sk-line" style="width:80%"></div>
          <div class="sk sk-line" style="width:55%"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- JS at end of body — never blocks HTML parsing.
       type=module defers automatically. -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
