<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lumina — You're offline</title>
  <style>
    /* All styles inline — no external CSS dependency */
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: #F8F6F1;
      color: #3D3A37;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .container { max-width: 480px; width: 100%; }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #FFF3D0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 2rem;
    }

    h1 {
      font-family: 'Fraunces', 'Iowan Old Style', Georgia, serif;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: #252320;
    }

    p {
      color: #5A5450;
      line-height: 1.7;
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 0.875rem 2.5rem;
      background: #C4973A;
      color: #141210;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      min-height: 48px;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); opacity: 0.8; }

    .offline-tip {
      margin-top: 2rem;
      padding: 1rem 1.25rem;
      background: white;
      border-radius: 12px;
      border: 1px solid #E8E0D0;
      font-size: 0.875rem;
      color: #7A7268;
      line-height: 1.6;
      text-align: left;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1C1713; color: #E8E0D0; }
      h1   { color: #F5F0E8; }
      p    { color: #A09080; }
      .icon { background: #3D2E10; }
      .offline-tip { background: #252220; border-color: #3D3530; color: #9A8878; }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn { transition: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌿</div>
    <h1>You're in a quiet place</h1>
    <p>
      Lumina needs a connection to load new stories.<br />
      Your drafts and saved stories are still with you.
    </p>
    <button class="btn" onclick="window.location.reload()">
      Try again
    </button>
    <div class="offline-tip">
      💡 Stories you've already opened are cached and readable offline.
    </div>
  </div>
</body>
</html>
