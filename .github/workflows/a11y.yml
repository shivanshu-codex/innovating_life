name: Accessibility Audit

on:
  pull_request:
    branches: [main, develop]

jobs:
  a11y:
    name: WCAG 2.2 AA Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start preview server
        run: npm run preview &
        env:
          PORT: 4173

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Run axe accessibility audit
        uses: dequelabs/axe-core-npm/packages/cli@main
        with:
          args: >
            http://localhost:4173
            http://localhost:4173/explore
            http://localhost:4173/story/sample-story
            http://localhost:4173/topic/personal-growth
            --include "html"
            --tags wcag2a,wcag2aa,wcag21a,wcag21aa,wcag22aa
            --exit

      - name: Run Pa11y on key pages
        run: |
          npx pa11y http://localhost:4173 --standard WCAG2AA --reporter json > pa11y-home.json
          npx pa11y http://localhost:4173/explore --standard WCAG2AA --reporter json > pa11y-explore.json
          npx pa11y http://localhost:4173/auth --standard WCAG2AA --reporter json > pa11y-auth.json

      - name: Upload a11y reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-reports
          path: |
            pa11y-home.json
            pa11y-explore.json
            pa11y-auth.json
